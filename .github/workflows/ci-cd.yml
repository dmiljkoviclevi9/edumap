name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  PUBLISH_DIR: ./publish

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test
        run: dotnet test --no-build --no-restore --configuration ${{ env.CONFIGURATION }} --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: '**/TestResults/test-results.trx'

      - name: Publish
        run: dotnet publish src/EduMap.Api --no-build --no-restore --configuration ${{ env.CONFIGURATION }} --output ${{ env.PUBLISH_DIR }}

      - name: Upload publish artifact
        uses: actions/upload-artifact@v6
        with:
          name: app
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    needs: build-test
    # Gated on the DEPLOY_ENABLED repo variable so the workflow stays green
    # while Azure is being bootstrapped. Authenticates via OIDC against a
    # User-Assigned Managed Identity (mi-edumap-github) federated to this
    # repo's `production` environment — no long-lived publish profile or
    # client secret in GitHub. See WALKTHROUGH 2.2 for setup.
    if: |
      github.ref == 'refs/heads/main'
      && github.event_name != 'pull_request'
      && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required to mint the OIDC token GitHub sends to Azure
      contents: read    # default, kept explicit since we narrowed `permissions`
    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v5
        with:
          name: app
          path: ${{ env.PUBLISH_DIR }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
