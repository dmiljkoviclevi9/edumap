<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
<title>Edu-Map</title>

<!-- Nunito for kid-friendly rounded type -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

<style>
  /* ---------- base ---------- */
  :root{
    --ocean:#cfeaf6;
    --ink:#222;
    --modal-bg:#fffdf7;
    --shadow: 0 18px 50px rgba(20, 40, 70, .22), 0 4px 12px rgba(20,40,70,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--ocean);font-family:"Nunito",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
  #map{position:fixed;inset:0;background:var(--ocean);outline:none}

  /* ---------- SVG map ---------- */
  #map svg{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
  #map svg:active{cursor:grabbing}
  #map svg .ocean{fill:var(--ocean)}
  #map svg path.country{cursor:pointer;transition:fill 80ms ease}
  #map svg path.uk-outline{cursor:pointer}

  /* tiny attribution credit, bottom-right */
  .attribution{
    position:fixed;right:0;bottom:0;
    background:rgba(255,255,255,.55);
    font-size:9px;color:#456;
    padding:1px 5px;border-radius:6px 0 0 0;
    pointer-events:none;z-index:500;
  }

  /* ---------- zoom controls (replaces Leaflet's bar) ---------- */
  .zoom-controls{
    position:fixed;top:12px;left:12px;z-index:1500;
    display:flex;flex-direction:column;
    box-shadow:0 6px 18px rgba(20,40,70,.15);
    border-radius:18px;overflow:hidden;
  }
  .zoom-controls button{
    background:#fffdf7;color:#333;border:none;
    width:44px;height:44px;line-height:44px;
    font-size:24px;font-weight:800;cursor:pointer;
    border-bottom:1px solid #eee;
    font-family:inherit;padding:0;
  }
  .zoom-controls button:last-child{border-bottom:none}
  .zoom-controls button:hover{background:#fff5d8}
  .zoom-controls button:focus-visible{outline:3px solid #ff7a6e;outline-offset:-3px}

  /* ---------- loading spinner ---------- */
  .loader{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--ocean);z-index:1000;flex-direction:column;gap:18px;
  }
  .loader .ring{
    width:64px;height:64px;border-radius:50%;
    border:6px solid #ffffff80;border-top-color:#ff7a6e;
    animation:spin 1s linear infinite;
  }
  .loader .word{font-weight:800;font-size:18px;color:#3a6a82;letter-spacing:.5px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){
    .loader .ring{animation:none;border-top-color:#ff7a6e;border-right-color:#ffd96b;border-bottom-color:#7ed957;border-left-color:#69b9ff}
  }

  /* ---------- modal ---------- */
  .scrim{
    position:fixed;inset:0;background:rgba(20,30,50,.35);
    z-index:2000;display:flex;align-items:center;justify-content:center;
    padding:20px;
    opacity:0;pointer-events:none;
    transition:opacity .18s ease;
  }
  .scrim.show{opacity:1;pointer-events:auto}
  .modal{
    background:var(--modal-bg);
    width:80%;max-width:420px;
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:28px 24px 26px;
    text-align:center;
    position:relative;
    transform:translateY(12px) scale(.96);
    transition:transform .22s cubic-bezier(.2,.9,.3,1.2);
    border:3px solid #fff;
  }
  .scrim.show .modal{transform:translateY(0) scale(1)}
  @media (prefers-reduced-motion: reduce){
    .scrim,.modal{transition:none!important}
    .modal{transform:none!important}
  }

  .flag-wrap{
    width:200px;max-width:60vw;aspect-ratio:4/3;
    margin:6px auto 18px;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
    background:#eef2f5;
    display:flex;align-items:center;justify-content:center;
  }
  .flag-wrap img{display:block;width:100%;height:100%;object-fit:cover;opacity:1;transition:opacity 140ms ease}
  @media (prefers-reduced-motion: reduce){
    .flag-wrap img{transition:none}
  }

  .country-name{
    font-weight:800;font-size:34px;line-height:1.05;color:#1f2a44;
    margin:2px 0 4px;letter-spacing:-.5px;
  }
  .capital{
    font-weight:600;font-size:18px;color:#5e6a86;margin:0 0 14px;
  }
  .capital .pin{display:inline-block;margin-right:4px;transform:translateY(1px)}
  .fun-fact{
    font-style:italic;font-weight:400;font-size:16px;line-height:1.4;
    color:#3d4a66;
    background:#fff5d8;
    border-radius:14px;
    padding:12px 14px;
    margin:6px 4px 0;
  }

  .close-btn{
    position:absolute;top:-14px;right:-14px;
    width:48px;height:48px;border-radius:50%;
    background:#ff7a6e;color:#fff;
    border:3px solid #fff;
    font-size:22px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(255,80,70,.4);
    transition:transform .15s ease;
    padding:0;line-height:1;
  }
  .close-btn:hover{transform:scale(1.08) rotate(90deg)}
  .close-btn:active{transform:scale(.95)}
  @media (prefers-reduced-motion: reduce){
    .close-btn{transition:none}
    .close-btn:hover{transform:none}
  }

  /* ---------- toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:6%;transform:translateX(-50%) translateY(20px);
    background:#1f2a44;color:#fff;
    padding:14px 22px;border-radius:999px;
    font-weight:800;font-size:18px;
    box-shadow:var(--shadow);
    opacity:0;pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:2500;
    display:flex;align-items:center;gap:10px;
  }
  .toast .emoji{font-size:22px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- responsive ---------- */
  @media (max-width:480px){
    .country-name{font-size:28px}
    .capital{font-size:16px}
    .fun-fact{font-size:15px}
    .flag-wrap{width:180px}
  }

  /* touch devices: thicker borders for legibility */
  @media (hover: none){
    /* applied via JS too, but this is a backup */
  }
</style>
</head>
<body>

<div id="map" role="application" aria-label="Interactive world map"></div>

<div class="loader" id="loader" aria-live="polite">
  <div class="ring" aria-hidden="true"></div>
  <div class="word">Loading the world…</div>
</div>

<div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-labelledby="country-name">
  <div class="modal" id="modal">
    <button class="close-btn" id="close-btn" aria-label="Close">×</button>
    <div class="flag-wrap"><img id="flag-img" alt="" /></div>
    <h1 class="country-name" id="country-name">—</h1>
    <p class="capital" id="capital"><span class="pin">📍</span><span id="capital-text">—</span></p>
    <p class="fun-fact" id="fun-fact" hidden></p>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite">
  <span class="emoji">✨</span><span id="toast-text">Coming soon!</span>
</div>

<!-- d3 (v7) — d3-geo for Equal Earth projection, d3-zoom for pan/zoom, d3-selection for DOM. -->
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" crossorigin="anonymous"></script>

<!-- Tiny attribution credit (no Leaflet control to host it anymore). -->
<div class="attribution">Map © OSM contributors</div>

<script>
/* =========================================================================
   Edu-Map — kids' interactive world map
   ========================================================================= */

/* ---- country data is loaded from the API (see Promise.all below) ---- */
let COUNTRIES = [];
let COUNTRY_BY_ISO = {};

/* The geo-countries dataset (Natural Earth derived) tags a handful of features
   with ISO_A2 = "-99" instead of the real code. The ones we actually have
   country data for are listed here; anything else with -99 (Somaliland,
   Northern Cyprus, military bases, etc.) is intentionally left to fall through
   to the "Coming soon!" toast. */
const NAME_TO_ISO_OVERRIDE = {
  "France": "FR",
  "Norway": "NO",
  "Kosovo": "XK",
};

function resolveIso(properties){
  const p = properties || {};
  const raw = (p["ISO3166-1-Alpha-2"] || p.ISO_A2 || p.iso_a2 || p.ISO_A2_EH || "").toUpperCase();
  if (raw && raw !== "-99") return raw;
  const name = p.name || p.NAME || p.ADMIN || "";
  return NAME_TO_ISO_OVERRIDE[name] || "";
}

/* d3-geo follows RFC 7946: counterclockwise rings are exteriors, clockwise
   rings are holes. Some GeoJSON files (notably our uk-nations.geojson) still
   ship the old "clockwise = exterior" convention — under the new rule, those
   polygons are read as holes on the *sphere*, which means each one paints
   everything except itself. Symptom: a single country covers the world.

   Rewinding must be done PER POLYGON, not per feature: a MultiPolygon can
   easily contain a mix of correctly-wound polygons and wrong-wound ones
   (e.g. England's MultiPolygon has 565 right + 1 wrong). Per-feature
   reversal flips them ALL, swapping the bug from "1 polygon wrong" to
   "565 polygons wrong" — i.e. makes it worse. Per-polygon: we wrap each
   polygon as its own {type:"Polygon"}, measure with d3.geoArea, and only
   reverse the rings of polygons whose area exceeds half the sphere. */
function rewindPolygon(rings){
  // rings = [outer, hole1, hole2, ...]. Each ring is [[lng,lat], ...].
  const probe = { type: "Polygon", coordinates: rings };
  if (d3.geoArea(probe) > 2 * Math.PI) {
    rings.forEach(r => r.reverse());
  }
}

function rewindFeature(feature){
  if (!feature || !feature.geometry) return feature;
  if (feature.geometry.type === "Polygon") {
    rewindPolygon(feature.geometry.coordinates);
  } else if (feature.geometry.type === "MultiPolygon") {
    feature.geometry.coordinates.forEach(rewindPolygon);
  }
  return feature;
}

function rewindFeatures(geojson){
  if (geojson && geojson.features) geojson.features.forEach(rewindFeature);
  return geojson;
}

/* ---- picture-book palette: bright, saturated, kid-friendly ---- */
const PALETTE = [
  "#ff8a7a", // coral
  "#ffd86b", // sunny yellow
  "#9be36a", // leaf green
  "#7cc7ff", // sky blue
  "#c9a8f0", // lilac
  "#ffb185", // peach
  "#7ee0c5", // mint
  "#ff9ec7", // bubblegum pink
  "#ffe27a", // butter
  "#a3d9a5", // pistachio
];

/* darken a hex color by ~15% for hover/press feedback */
function darken(hex, amt=0.15){
  const h = hex.replace("#","");
  const r = parseInt(h.substr(0,2),16);
  const g = parseInt(h.substr(2,2),16);
  const b = parseInt(h.substr(4,2),16);
  const f = (1-amt);
  const to = v => Math.max(0, Math.min(255, Math.round(v*f)));
  return `rgb(${to(r)},${to(g)},${to(b)})`;
}

/* ---- detect touch / reduced motion ---- */
const IS_TOUCH = window.matchMedia("(hover: none)").matches;
const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const BORDER_WEIGHT = IS_TOUCH ? 1.4 : 1;

/* =========================================================================
   Map setup — d3-geo with the Equal Earth projection.
   Equal Earth is an equal-area projection: a country's rendered area is
   proportional to its real area. Greenland looks like Greenland; Antarctica
   looks like a band along the southern edge instead of dominating the map.
   We render the whole world as a single SVG and pan/zoom by transforming
   one <g>, so polygons never re-clip during a swipe.
   ========================================================================= */
const mapEl = document.getElementById("map");

function viewportSize(){ return [window.innerWidth, window.innerHeight]; }

let [W, H] = viewportSize();

const svg = d3.select(mapEl).append("svg")
  .attr("width", W).attr("height", H)
  .attr("viewBox", `0 0 ${W} ${H}`)
  .attr("preserveAspectRatio", "xMidYMid meet")
  .attr("role", "application")
  .attr("aria-label", "Interactive world map");

// Ocean background (rendered in screen space, doesn't move with the world).
svg.append("rect").attr("class", "ocean").attr("x", 0).attr("y", 0).attr("width", W).attr("height", H);

// Single group d3-zoom transforms. All polygons live inside it.
const zoomTarget = svg.append("g").attr("class", "zoom-target");

// Stacking order = DOM order. Countries at the bottom, UK home-nations on top
// of the GB hole we cut out, then the blue UK ring on the very top.
const layerCountries = zoomTarget.append("g").attr("class", "layer-countries");
const layerUkNations = zoomTarget.append("g").attr("class", "layer-uk-nations");
const layerUkOutline = zoomTarget.append("g").attr("class", "layer-uk-outline");

let projection = d3.geoEqualEarth();
let geoPath    = d3.geoPath(projection);

function fitProjection(){
  // 20px viewport padding so the world has some breathing room.
  projection.fitExtent([[20, 20], [W - 20, H - 20]], { type: "Sphere" });
  geoPath = d3.geoPath(projection);
}
fitProjection();

/* Pan limits — translateExtent is in projected (screen) coordinates.
   We compute the bounding box of the sphere under our current projection and
   pad generously so the user can scroll the world a bit off-edge for context. */
function computeTranslateExtent(){
  const [[x0, y0], [x1, y1]] = geoPath.bounds({ type: "Sphere" });
  const padX = W * 0.6, padY = H * 0.6;
  return [[x0 - padX, y0 - padY], [x1 + padX, y1 + padY]];
}

const zoomBehavior = d3.zoom()
  .scaleExtent([1, 8])
  .translateExtent(computeTranslateExtent())
  .on("zoom", (event) => {
    zoomTarget.attr("transform", event.transform);
    updateUkOutlineWeight(event.transform.k);
  });

svg.call(zoomBehavior);

/* Block iOS Safari from interpreting two-finger pinches as page zoom — we
   want them to drive d3-zoom instead. */
mapEl.addEventListener("gesturestart", (e) => e.preventDefault());
mapEl.addEventListener("dblclick", (e) => e.preventDefault());  // double-tap-zoom

/* =========================================================================
   Zoom buttons (replaces Leaflet's L.control.zoom). Animation duration of
   zero when prefers-reduced-motion is set.
   ========================================================================= */
const zoomControls = document.createElement("div");
zoomControls.className = "zoom-controls";
zoomControls.innerHTML = `
  <button type="button" id="zoom-in"  aria-label="Zoom in">+</button>
  <button type="button" id="zoom-out" aria-label="Zoom out">−</button>
`;
document.body.appendChild(zoomControls);

function animatedScaleBy(factor){
  const target = REDUCED_MOTION ? svg : svg.transition().duration(220).ease(d3.easeCubicOut);
  zoomBehavior.scaleBy(target, factor);
}
document.getElementById("zoom-in").addEventListener("click",  () => animatedScaleBy(1.5));
document.getElementById("zoom-out").addEventListener("click", () => animatedScaleBy(1 / 1.5));

/* =========================================================================
   Country coloring — graph-coloring with neighbor-collision avoidance
   We compute a deterministic candidate color from ISO2 hash, then if any
   neighbor (sharing a border, detected by polygon proximity) collides we
   nudge to the next palette index.
   ========================================================================= */

/* deterministic hash → palette index */
function hashIso(iso){
  let h = 0;
  for (let i=0;i<iso.length;i++) h = (h*31 + iso.charCodeAt(i)) >>> 0;
  return h % PALETTE.length;
}

/* simplistic neighbor detection: two features are neighbors if any of their
   bounding boxes touch AND any of their coordinate points lie within ε of
   each other. For 250 polygons this is fine. */
function buildNeighbors(features){
  const neighbors = new Map();           // iso → Set(iso)
  const points = new Map();              // iso → Set("lat,lng" rounded)
  const bboxes = new Map();              // iso → [minX,minY,maxX,maxY]

  const round = v => Math.round(v*4)/4; // ~28 km grid; good enough for adjacency

  for (const f of features){
    const iso = resolveIso(f.properties);
    if (!iso) continue;
    const set = new Set();
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;

    const eat = (coords) => {
      for (const c of coords){
        const x = c[0], y = c[1];
        if (x<minX)minX=x; if (x>maxX)maxX=x;
        if (y<minY)minY=y; if (y>maxY)maxY=y;
        set.add(round(y)+","+round(x));
      }
    };
    const walk = (g) => {
      if (g.type === "Polygon") g.coordinates.forEach(eat);
      else if (g.type === "MultiPolygon") g.coordinates.forEach(p => p.forEach(eat));
    };
    walk(f.geometry);
    points.set(iso, set);
    bboxes.set(iso, [minX,minY,maxX,maxY]);
    neighbors.set(iso, new Set());
  }

  const isos = [...points.keys()];
  for (let i=0;i<isos.length;i++){
    const a = isos[i], ba = bboxes.get(a), pa = points.get(a);
    for (let j=i+1;j<isos.length;j++){
      const b = isos[j], bb = bboxes.get(b);
      // bbox overlap (with small pad) — fast reject
      if (ba[2] < bb[0]-1 || bb[2] < ba[0]-1 || ba[3] < bb[1]-1 || bb[3] < ba[1]-1) continue;
      const pb = points.get(b);
      let touch = false;
      // intersect smaller into larger
      const [small,big] = pa.size < pb.size ? [pa,pb] : [pb,pa];
      for (const k of small){ if (big.has(k)){ touch = true; break; } }
      if (touch){
        neighbors.get(a).add(b);
        neighbors.get(b).add(a);
      }
    }
  }
  return neighbors;
}

function colorize(features){
  const neighbors = buildNeighbors(features);
  const assigned = new Map();           // iso → palette idx
  // process in stable order (alpha) so coloring is deterministic
  const isos = [...neighbors.keys()].sort();
  for (const iso of isos){
    let idx = hashIso(iso);
    const taken = new Set();
    for (const n of neighbors.get(iso)) if (assigned.has(n)) taken.add(assigned.get(n));
    let attempts = 0;
    while (taken.has(idx) && attempts < PALETTE.length){
      idx = (idx + 1) % PALETTE.length;
      attempts++;
    }
    assigned.set(iso, idx);
  }
  return assigned;
}

/* =========================================================================
   Render — draw each GeoJSON feature as an SVG <path>. vector-effect
   "non-scaling-stroke" keeps borders at 1 px no matter how zoomed in we are,
   so they're never invisible at world view nor a thick mess at max zoom.
   ========================================================================= */
function renderCountries(geojson, layer){
  const colorMap = colorize(geojson.features);

  // Cache base fill per ISO so hover handlers don't recompute on every event.
  const baseFill = (iso) => {
    const idx = colorMap.get(iso) ?? hashIso(iso || "ZZ");
    return PALETTE[idx] || "#cccccc";
  };

  const sel = layer.selectAll("path.country")
    .data(geojson.features)
    .join("path")
    .attr("class", "country")
    .attr("d", geoPath)
    .attr("vector-effect", "non-scaling-stroke")
    .attr("fill", (f) => baseFill(resolveIso(f.properties)))
    .attr("stroke", "#222")
    .attr("stroke-width", BORDER_WEIGHT)
    .attr("stroke-linejoin", "round")
    .on("click", (event, f) => onCountryTapped(resolveIso(f.properties), f));

  // Desktop hover: darken + raise (move to end of parent's children → drawn
  // on top, so the thicker border isn't covered by a neighbor).
  if (!IS_TOUCH){
    sel.on("mouseenter", function(_event, f){
      const iso = resolveIso(f.properties);
      d3.select(this).raise()
        .attr("fill", darken(baseFill(iso), 0.18))
        .attr("stroke-width", BORDER_WEIGHT + 0.6);
    })
    .on("mouseleave", function(_event, f){
      const iso = resolveIso(f.properties);
      d3.select(this)
        .attr("fill", baseFill(iso))
        .attr("stroke-width", BORDER_WEIGHT);
    });
  }
}

/* =========================================================================
   UK outline — a thin blue ring along the British/Irish coastline, drawn
   on top of the home-nations overlay and clickable for the United Kingdom
   modal. The home-nation polygons cover the landmass and capture clicks
   themselves; the outline only intercepts clicks that land on the coast.
   Stroke width scales inversely with d3-zoom's k so it stays at a useful
   visual size whether the user is at world view or zoomed deep into GB.
   ========================================================================= */
const UK_BORDER_COLOR = "#1d6cff";

/* At k=1 (initial fit) we want ~2 px so GB doesn't look more important than
   its neighbours; at k=8 (max zoom) we want ~5 px for an obvious tap target.
   With vector-effect: non-scaling-stroke this is a pure visual-pixel value. */
function ukWeightFor(k){
  const base = Math.max(1.5, Math.min(5, 1 + (k - 1) * 0.55));
  return IS_TOUCH ? base + 1 : base;
}

let ukOutlineHovering = false;

function updateUkOutlineWeight(k){
  if (ukOutlineHovering) return;
  layerUkOutline.selectAll("path").attr("stroke-width", ukWeightFor(k));
}

function renderUkOutline(gbFeature){
  if (!gbFeature || !gbFeature.geometry) return;
  const geom = gbFeature.geometry;
  // Each MultiPolygon → array of polygons → polygon[0] is the outer ring.
  // (Holes / inner rings are intentionally skipped — we don't want to circle
  // any inland water bodies.)
  const polygons = geom.type === "MultiPolygon" ? geom.coordinates
                  : geom.type === "Polygon"      ? [geom.coordinates]
                  : [];
  const features = polygons.map((rings) => ({
    type: "Feature",
    properties: { "ISO3166-1-Alpha-2": "GB", name: "United Kingdom" },
    geometry: { type: "LineString", coordinates: rings[0] },
  }));

  const sel = layerUkOutline.selectAll("path.uk-outline")
    .data(features)
    .join("path")
    .attr("class", "uk-outline")
    .attr("d", geoPath)
    .attr("fill", "none")
    .attr("stroke", UK_BORDER_COLOR)
    .attr("stroke-width", ukWeightFor(1))
    .attr("stroke-opacity", 0.9)
    .attr("stroke-linecap", "round")
    .attr("stroke-linejoin", "round")
    .attr("vector-effect", "non-scaling-stroke")
    .on("click", (event) => {
      // Stop the click from bubbling to the home-nation polygon below.
      event.stopPropagation();
      onCountryTapped("GB", null);
    });

  if (!IS_TOUCH){
    sel.on("mouseenter", function(){
      ukOutlineHovering = true;
      const k = d3.zoomTransform(svg.node()).k;
      d3.select(this).attr("stroke-opacity", 1).attr("stroke-width", ukWeightFor(k) + 3);
    })
    .on("mouseleave", function(){
      ukOutlineHovering = false;
      const k = d3.zoomTransform(svg.node()).k;
      d3.select(this).attr("stroke-opacity", 0.9).attr("stroke-width", ukWeightFor(k));
    });
  }
}

/* =========================================================================
   Tap → modal or "Coming soon!" toast
   ========================================================================= */
const scrim     = document.getElementById("scrim");
const modal     = document.getElementById("modal");
const closeBtn  = document.getElementById("close-btn");
const flagImg   = document.getElementById("flag-img");
const nameEl    = document.getElementById("country-name");
const capRow    = document.getElementById("capital");        // <p> wrapper
const capEl     = document.getElementById("capital-text");   // inner span
const factEl    = document.getElementById("fun-fact");
const toast     = document.getElementById("toast");
const toastText = document.getElementById("toast-text");

function onCountryTapped(iso, feature){
  // fire-and-forget tracking; skip when we couldn't resolve a real ISO
  // (avoids a pointless 404 on /api/track/ with empty segment)
  if (iso){
    try { fetch("/api/track/" + iso, { method:"POST" }).catch(()=>{}); } catch(e){}
  }

  const data = COUNTRY_BY_ISO[iso];
  if (!data){
    showToast("Coming soon!");
    return;
  }
  openModal(data);
}

function openModal(c){
  nameEl.textContent = c.name;

  // Hide the whole capital row when there's no capital (e.g. Antarctica)
  // rather than showing a placeholder dash that confuses kids.
  if (c.capital){
    capRow.hidden = false;
    capEl.textContent = c.capital;
  } else {
    capRow.hidden = true;
    capEl.textContent = "";
  }

  // Flag with CDN fallback. Hide the <img> immediately (opacity 0) so the
  // previous country's flag doesn't linger while the new SVG downloads —
  // it fades back in via the CSS transition once load fires.
  const local = c.flagUrl;
  const cdn   = "https://cdn.jsdelivr.net/npm/flag-icons/flags/4x3/" + c.iso2.toLowerCase() + ".svg";
  flagImg.alt = "Flag of " + c.name;
  flagImg.style.opacity = "0";
  flagImg.onload = function(){ flagImg.style.opacity = "1"; };
  flagImg.onerror = function(){
    // if the local /flags/xx.svg 404s, fall back to CDN (onload will re-fire)
    flagImg.onerror = null;
    flagImg.src = cdn;
  };
  flagImg.src = local;

  if (c.funFact){
    factEl.hidden = false;
    factEl.textContent = c.funFact;
  } else {
    factEl.hidden = true;
    factEl.textContent = "";
  }

  scrim.classList.add("show");
  // focus close button for keyboard users
  setTimeout(() => closeBtn.focus(), 50);
}

function closeModal(){ scrim.classList.remove("show"); }

closeBtn.addEventListener("click", closeModal);
scrim.addEventListener("click", (e) => { if (e.target === scrim) closeModal(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

let toastTimer = null;
function showToast(msg){
  toastText.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1700);
}

/* =========================================================================
   Load GeoJSON (world borders) and country data (from our API) in parallel
   =========================================================================
   World borders are self-hosted in wwwroot/data/countries.geojson (Natural
   Earth 50m, ~3 MB, ISO_A2-tagged — same property name our resolveIso uses
   for the 10m dataset). Going same-origin both fixes the corporate-proxy
   block we hit on raw.githubusercontent.com and shrinks the payload 5×
   versus the previous 10m source. If page-load becomes a concern again,
   the next step is TopoJSON at 50m (~290 KB) via the world-atlas package
   and topojson-client; see git history of this file for the migration
   notes that were here. */
const GEO_URL = "/data/countries.geojson";
const UK_NATIONS_URL = "/data/uk-nations.geojson";

Promise.all([
  fetch(GEO_URL).then(r => {
    if (!r.ok) throw new Error("geojson http " + r.status);
    return r.json();
  }),
  fetch("/api/countries").then(r => {
    if (!r.ok) throw new Error("countries http " + r.status);
    return r.json();
  }).catch(err => {
    // soft-fail: render the map even if our API is down
    console.warn("Couldn't load /api/countries, modal will show 'Coming soon!' for every tap:", err);
    return [];
  }),
  // UK home-nations overlay; soft-fail to a single GB feature if missing.
  fetch(UK_NATIONS_URL).then(r => r.ok ? r.json() : null).catch(() => null),
])
  .then(([geo, countries, ukNations]) => {
    COUNTRIES = countries || [];
    COUNTRY_BY_ISO = Object.fromEntries(COUNTRIES.map(c => [c.iso2.toUpperCase(), c]));

    // Fix any wrong-wound polygons (see rewindFeatures comment above). The
    // world geo-countries file is RFC 7946 compliant, but our UK overlay
    // ships the old clockwise convention.
    rewindFeatures(geo);
    rewindFeatures(ukNations);

    // If we have the UK home-nations overlay, pull the GB feature out of the
    // world GeoJSON (so its multipolygon doesn't intercept clicks/hover on
    // offshore bits) and reuse it to draw the blue UK outline on top.
    let gbFeature = null;
    if (ukNations) {
      gbFeature = geo.features.find((f) => resolveIso(f.properties) === "GB");
      geo = {
        ...geo,
        features: geo.features.filter((f) => resolveIso(f.properties) !== "GB"),
      };
    }

    renderCountries(geo, layerCountries);
    if (ukNations) {
      renderCountries(ukNations, layerUkNations);
      renderUkOutline(gbFeature);
    }
    document.getElementById("loader").style.display = "none";
  })
  .catch(err => {
    console.error("Failed to load world:", err);
    const l = document.getElementById("loader");
    l.innerHTML = '<div class="word" style="color:#c33">Couldn\'t load the world — please try again.</div>';
  });

/* keep view sane on resize / orientation flip. We rebuild the projection
   for the new viewport and re-draw every path. The zoom transform is reset
   to identity — preserving it across a refit would mostly result in confusing
   off-screen positions because Equal Earth's projected bounds change shape. */
window.addEventListener("resize", () => {
  [W, H] = viewportSize();
  svg.attr("width", W).attr("height", H).attr("viewBox", `0 0 ${W} ${H}`);
  svg.select("rect.ocean").attr("width", W).attr("height", H);
  fitProjection();
  zoomTarget.selectAll("path").attr("d", geoPath);
  zoomBehavior.translateExtent(computeTranslateExtent());
  svg.call(zoomBehavior.transform, d3.zoomIdentity);
  updateUkOutlineWeight(1);
});

/* =========================================================================
   External CDN URLs used (audit list)
   -------------------------------------------------------------------------
   • https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js                    (map renderer, ~90 KB min / ~30 KB gz)
   • https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap
   • https://fonts.gstatic.com/                                              (served by the Google Fonts stylesheet)
   • https://cdn.jsdelivr.net/npm/flag-icons/flags/4x3/{iso2}.svg            (fallback for flag images when /flags/{iso2}.svg is unavailable)
   Everything else (world borders, UK overlay, country data, flag SVGs) is
   served from this app's own wwwroot — no third-party dependencies at
   render time once d3 + Nunito have loaded.
   ========================================================================= */
</script>
